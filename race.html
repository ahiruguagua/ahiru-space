<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>アヒル連打レース - ahiru-space.com</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TXQFE7EYKZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TXQFE7EYKZ');

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a6b3c;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'Nunito', 'Noto Sans JP', sans-serif;
      overflow: hidden; touch-action: none;
      user-select: none; -webkit-user-select: none;
    }
    #gameCanvas { display: block; image-rendering: pixelated; max-width: 100vw; max-height: 100vh; }
    .back-link {
      position: fixed; top: 10px; left: 10px;
      color: rgba(255,255,255,0.6); text-decoration: none;
      font-size: 14px; font-weight: 700; z-index: 100;
      padding: 4px 12px; background: rgba(0,0,0,0.3); border-radius: 20px;
    }
    .back-link:hover { color: #FFD700; }

    .gameover-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 80; background: rgba(0,0,0,0.7);
      flex-direction: column; align-items: center; justify-content: center;
      padding: 20px; font-family: 'Nunito', 'Noto Sans JP', sans-serif;
    }
    .gameover-overlay.active { display: flex; }
    .gameover-panel {
      background: rgba(10,10,30,0.95); border: 2px solid #FFD700;
      border-radius: 20px; padding: 2rem; max-width: 380px; width: 100%; text-align: center;
    }
    .gameover-panel h2 { color: #FFD700; font-size: 1.8rem; margin-bottom: 1rem; }
    .gameover-panel .stats { color: #fff; font-size: 1rem; line-height: 2; margin-bottom: 1rem; }
    .gameover-panel .stats span { color: #FFD700; font-weight: 800; }
    .gameover-panel .highscore-entry { margin: 1rem 0; }
    .gameover-panel .highscore-entry p { color: #FFD700; font-weight: 700; margin-bottom: 0.5rem; }
    .gameover-panel input {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      border: 2px solid rgba(255,215,0,0.4); background: rgba(255,255,255,0.1);
      color: #fff; font-size: 1rem; font-family: inherit; outline: none; margin-bottom: 0.5rem;
    }
    .gameover-panel input:focus { border-color: #FFD700; }
    .gameover-panel input::placeholder { color: rgba(255,255,255,0.4); }
    .go-btn {
      display: inline-block; padding: 10px 24px; border-radius: 50px; border: none;
      font-family: inherit; font-size: 1rem; font-weight: 800;
      cursor: pointer; margin: 6px; transition: transform 0.2s;
    }
    .go-btn:active { transform: scale(0.95); }
    .go-btn.primary { background: #FFD700; color: #000; }
    .go-btn.secondary { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); }
    .submitted-msg { color: #FFD700; font-weight: 700; margin: 0.5rem 0; }

    .lb-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 90; background: rgba(0,0,0,0.8);
      flex-direction: column; align-items: center; justify-content: center; padding: 20px;
    }
    .lb-overlay.active { display: flex; }
    .lb-panel {
      background: rgba(10,10,30,0.97); border: 2px solid #FFD700;
      border-radius: 20px; padding: 1.5rem; max-width: 400px; width: 100%;
      max-height: 80vh; overflow-y: auto;
    }
    .lb-panel h2 { color: #FFD700; text-align: center; font-size: 1.4rem; margin-bottom: 1rem; }
    .lb-row { display: flex; justify-content: space-between; padding: 6px 8px; color: rgba(255,255,255,0.8); font-size: 0.95rem; }
    .lb-row.top3 { color: #FFD700; font-weight: 700; }
    .lb-row .rank { width: 36px; }
    .lb-row .name { flex: 1; }
    .lb-row .score { text-align: right; }
    .lb-empty { color: rgba(255,255,255,0.5); text-align: center; padding: 2rem; }
    .lb-close { display: block; margin: 1rem auto 0; }

    .touch-controls {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 50; pointer-events: none;
      justify-content: center; align-items: flex-end; padding: 0 20px 20px;
    }
    @media (pointer: coarse) {
      .touch-controls { display: flex; }
    }
    .tap-btn {
      pointer-events: all;
      width: 160px; height: 80px; border-radius: 20px;
      background: rgba(255,215,0,0.3); border: 3px solid rgba(255,215,0,0.6);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: rgba(255,255,255,0.9); font-weight: 800;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Nunito', 'Noto Sans JP', sans-serif;
    }
    .tap-btn:active, .tap-btn.active {
      background: rgba(255,215,0,0.6); border-color: rgba(255,215,0,0.9);
    }
  </style>
</head>
<body>
  <a href="/" class="back-link">&larr; Home</a>
  <canvas id="gameCanvas" width="900" height="400"></canvas>

  <div class="gameover-overlay" id="gameoverOverlay">
    <div class="gameover-panel">
      <h2 id="goTitle">レース結果</h2>
      <div class="stats" id="goStats"></div>
      <div class="highscore-entry" id="hsEntry" style="display:none;">
        <p>ランキング入り！ なまえを入力:</p>
        <input type="text" id="hsName" maxlength="15" placeholder="なまえ" autocomplete="off">
        <button class="go-btn primary" id="hsSubmit">とうろく</button>
      </div>
      <div class="submitted-msg" id="hsSubmitted" style="display:none;">とうろくしました！</div>
      <div>
        <button class="go-btn primary" id="goRestart">もういちど</button>
        <button class="go-btn secondary" id="goLeaderboard">ランキング</button>
      </div>
    </div>
  </div>

  <div class="lb-overlay" id="lbOverlay">
    <div class="lb-panel">
      <h2>ランキング TOP 20</h2>
      <div id="lbList"></div>
      <button class="go-btn secondary lb-close" id="lbClose">とじる</button>
    </div>
  </div>

  <div class="touch-controls" id="touchControls">
    <div class="tap-btn" id="btnTap">🦆 連打！</div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = 900, H = 400;

    function resizeCanvas() {
      const ratio = W / H;
      let w = window.innerWidth, h = window.innerHeight;
      if (w / h > ratio) w = h * ratio; else h = w / ratio;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ===== AUDIO =====
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function playTap() {
      try {
        const c = getAudioCtx(), o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination); o.type = 'sine';
        const n = c.currentTime;
        o.frequency.setValueAtTime(800 + Math.random() * 200, n);
        o.frequency.exponentialRampToValueAtTime(400, n + 0.06);
        g.gain.setValueAtTime(0.15, n);
        g.gain.exponentialRampToValueAtTime(0.01, n + 0.08);
        o.start(n); o.stop(n + 0.08);
      } catch(e){}
    }
    function playCountdown() {
      try {
        const c = getAudioCtx(), o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination); o.type = 'square';
        const n = c.currentTime;
        o.frequency.setValueAtTime(440, n);
        g.gain.setValueAtTime(0.15, n);
        g.gain.exponentialRampToValueAtTime(0.01, n + 0.2);
        o.start(n); o.stop(n + 0.2);
      } catch(e){}
    }
    function playGo() {
      try {
        const c = getAudioCtx(), n = c.currentTime;
        [523, 659, 784].forEach((f, i) => {
          const o = c.createOscillator(), g = c.createGain();
          o.connect(g); g.connect(c.destination); o.type = 'sine';
          o.frequency.setValueAtTime(f, n + i * 0.08);
          g.gain.setValueAtTime(0.2, n + i * 0.08);
          g.gain.exponentialRampToValueAtTime(0.01, n + i * 0.08 + 0.25);
          o.start(n + i * 0.08); o.stop(n + i * 0.08 + 0.25);
        });
      } catch(e){}
    }
    function playFinish() {
      try {
        const c = getAudioCtx(), n = c.currentTime;
        [523, 659, 784, 1047].forEach((f, i) => {
          const o = c.createOscillator(), g = c.createGain();
          o.connect(g); g.connect(c.destination); o.type = 'sine';
          o.frequency.setValueAtTime(f, n + i * 0.12);
          g.gain.setValueAtTime(0.2, n + i * 0.12);
          g.gain.exponentialRampToValueAtTime(0.01, n + i * 0.12 + 0.4);
          o.start(n + i * 0.12); o.stop(n + i * 0.12 + 0.4);
        });
      } catch(e){}
    }

    // ===== CONSTANTS =====
    const LANE_H = H / 4;
    const FINISH_X = W - 80;
    const START_X = 70;

    const DUCKS = [
      { name: 'あなた', bodyColor: '#FFD700', headColor: '#FFC300', isPlayer: true },
      { name: 'CPU 1',  bodyColor: '#FFFFFF', headColor: '#EEEEEE', isPlayer: false },
      { name: 'CPU 2',  bodyColor: '#FF8C42', headColor: '#E07030', isPlayer: false },
      { name: 'CPU 3',  bodyColor: '#7ECE5C', headColor: '#6AB548', isPlayer: false },
    ];

    let state = 'waiting';
    let ducks = [];
    let rankings = [];
    let waveOffset = 0;
    let lastTime = 0;
    let raceStartTime = 0;
    let playerTime = 0;
    let leaderboard = [];
    let scoreSubmitted = false;
    let overlayShown = false;

    function initDucks() {
      ducks = DUCKS.map((d, i) => ({
        ...d,
        x: START_X,
        lane: i,
        speed: 0,
        boost: 0,
        bobPhase: Math.random() * Math.PI * 2,
        wingPhase: Math.random() * Math.PI * 2,
        finished: false,
        finishTime: 0,
        rank: 0,
        cpuNextTap: 0,
        cpuInterval: 150 + Math.random() * 250,
        cpuBurst: 0,
      }));
      rankings = [];
    }

    // ===== LEADERBOARD =====
    async function fetchLeaderboard() {
      try { const r = await fetch('/api/race-scores'); if (r.ok) leaderboard = await r.json(); } catch(e){}
    }

    async function submitScore(name, time) {
      try {
        const r = await fetch('/api/race-scores', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ name, time: Math.floor(time) })
        });
        if (r.ok) { leaderboard = await r.json(); scoreSubmitted = true; }
      } catch(e){}
    }

    function isHighScore(timeMs) {
      if (leaderboard.length < 20) return timeMs > 0;
      return timeMs < leaderboard[leaderboard.length - 1].time;
    }

    function showLeaderboardOverlay() {
      const list = document.getElementById('lbList');
      if (leaderboard.length === 0) {
        list.innerHTML = '<div class="lb-empty">まだスコアがありません</div>';
      } else {
        list.innerHTML = leaderboard.slice(0, 20).map((e, i) => {
          const medal = i===0?'👑':i===1?'🥈':i===2?'🥉':`${i+1}.`;
          const sec = ((e.time||0)/1000).toFixed(2);
          return `<div class="lb-row ${i<3?'top3':''}"><span class="rank">${medal}</span><span class="name">${e.name}</span><span class="score">${sec}秒</span></div>`;
        }).join('');
      }
      document.getElementById('lbOverlay').classList.add('active');
    }

    // ===== DRAWING =====
    function drawWater() {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#4AADCF');
      grad.addColorStop(1, '#2E8BAE');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 2;
      for (let row = 0; row < 20; row++) {
        ctx.beginPath();
        const y = row * 22 + (waveOffset % 22);
        for (let x = 0; x <= W; x += 4) {
          const dy = Math.sin((x + waveOffset * 40) * 0.03 + row) * 4;
          if (x === 0) ctx.moveTo(x, y + dy);
          else ctx.lineTo(x, y + dy);
        }
        ctx.stroke();
      }

      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      ctx.setLineDash([8, 8]);
      for (let i = 1; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(0, i * LANE_H);
        ctx.lineTo(W, i * LANE_H);
        ctx.stroke();
      }
      ctx.setLineDash([]);

      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(START_X - 10, 0);
      ctx.lineTo(START_X - 10, H);
      ctx.stroke();

      const checkSize = 10;
      for (let row = 0; row < H / checkSize; row++) {
        for (let col = 0; col < 3; col++) {
          ctx.fillStyle = (row + col) % 2 === 0 ? '#fff' : '#333';
          ctx.fillRect(FINISH_X + col * checkSize, row * checkSize, checkSize, checkSize);
        }
      }

      ctx.font = 'bold 14px Nunito, Noto Sans JP, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.textAlign = 'left';
      ducks.forEach((d, i) => {
        ctx.fillText(d.name, 6, i * LANE_H + 20);
      });
    }

    function drawDuck(duck) {
      const laneY = duck.lane * LANE_H + LANE_H / 2;
      const bob = Math.sin(duck.bobPhase) * 3;
      const x = duck.x;
      const y = laneY + bob;

      ctx.save();
      ctx.translate(x, y);

      if (duck.speed > 0.5) {
        ctx.globalAlpha = Math.min(duck.speed / 4, 0.4);
        ctx.fillStyle = '#fff';
        for (let i = 0; i < 3; i++) {
          const sx = -25 - i * 12 + Math.sin(duck.wingPhase + i) * 3;
          const sy = 8 + Math.cos(duck.wingPhase * 1.3 + i * 2) * 3;
          const r = 3 - i * 0.5;
          ctx.beginPath();
          ctx.arc(sx, sy, r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      ctx.fillStyle = duck.bodyColor;
      ctx.beginPath();
      ctx.ellipse(0, 5, 22, 16, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 1;
      ctx.stroke();

      const wingAngle = Math.sin(duck.wingPhase) * 0.2;
      ctx.save();
      ctx.translate(-2, 2);
      ctx.rotate(wingAngle);
      ctx.fillStyle = duck.headColor;
      ctx.beginPath();
      ctx.ellipse(0, 0, 12, 8, -0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.fillStyle = duck.headColor;
      ctx.beginPath();
      ctx.arc(16, -8, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.stroke();

      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(21, -11, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(22, -12, 1, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#FF6B2B';
      ctx.beginPath();
      ctx.moveTo(26, -8);
      ctx.lineTo(35, -6);
      ctx.lineTo(26, -3);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = duck.bodyColor;
      ctx.beginPath();
      ctx.moveTo(-20, 0);
      ctx.lineTo(-32, -8);
      ctx.lineTo(-28, 2);
      ctx.closePath();
      ctx.fill();

      ctx.restore();

      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(x, laneY + bob + 18, 26, 5, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    function drawRankBadges() {
      rankings.forEach((duck, i) => {
        const laneY = duck.lane * LANE_H + LANE_H / 2;
        const medals = ['🥇', '🥈', '🥉', '4'];
        ctx.font = '24px Nunito, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(medals[i], duck.x, laneY - 30);
      });
    }

    function drawHUD() {
      if (state === 'racing') {
        const elapsed = (performance.now() - raceStartTime) / 1000;
        ctx.font = 'bold 22px Nunito, Noto Sans JP, sans-serif';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'right';
        ctx.fillText(elapsed.toFixed(2) + '秒', W - 10, 25);
        ctx.textAlign = 'left';
      }
      if (state === 'waiting') {
        ctx.font = 'bold 28px Nunito, Noto Sans JP, sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.textAlign = 'center';
        ctx.fillText('スペースキーでスタート！', W / 2, H / 2 - 10);
        ctx.font = 'bold 16px Nunito, Noto Sans JP, sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillText('（タップでもOK）', W / 2, H / 2 + 20);
        ctx.textAlign = 'left';
      }
      if (state === 'countdown') {
        ctx.font = 'bold 72px Nunito, sans-serif';
        ctx.fillStyle = '#ffe44d';
        ctx.textAlign = 'center';
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 10;
        ctx.fillText(countdownText, W / 2, H / 2 + 20);
        ctx.shadowBlur = 0;
        ctx.textAlign = 'left';
      }
    }

    // ===== GAME LOGIC =====
    function tapDuck(duck) {
      duck.boost += 2.5;
      duck.speed += 0.8;
    }

    function updateDucks(dt) {
      const now = performance.now();

      ducks.forEach(duck => {
        if (duck.finished) return;

        if (!duck.isPlayer) {
          if (now > duck.cpuNextTap) {
            tapDuck(duck);
            duck.cpuBurst--;
            if (duck.cpuBurst > 0) {
              duck.cpuNextTap = now + 50 + Math.random() * 80;
            } else if (Math.random() < 0.05) {
              duck.cpuBurst = 3 + Math.floor(Math.random() * 5);
              duck.cpuNextTap = now + 40;
            } else {
              duck.cpuNextTap = now + duck.cpuInterval + (Math.random() - 0.5) * 100;
            }
          }
        }

        duck.boost *= 0.92;
        duck.speed += duck.boost * dt * 0.5;
        duck.speed *= 0.97;
        duck.speed = Math.max(duck.speed, 0.15);
        duck.x += duck.speed * dt * 60;

        duck.bobPhase += dt * (3 + duck.speed * 0.5);
        duck.wingPhase += dt * (4 + duck.speed * 1.2);

        if (duck.x >= FINISH_X) {
          duck.x = FINISH_X;
          duck.finished = true;
          duck.finishTime = performance.now() - raceStartTime;
          duck.rank = rankings.length + 1;
          rankings.push(duck);
          if (duck.isPlayer) {
            playerTime = duck.finishTime;
            playFinish();
          }
        }
      });

      if (rankings.length === 4 && state === 'racing') {
        state = 'finished';
        showResults();
      }
    }

    function showResults() {
      overlayShown = true;
      const playerRank = ducks[0].rank;
      const titles = ['🎉 1位！すごい！！', '👏 2位！おしい！', '😅 3位...まあまあ', '😢 4位...ドンマイ！'];
      document.getElementById('goTitle').textContent = titles[playerRank - 1];

      const medals = ['🥇', '🥈', '🥉', '　4位'];
      const lines = rankings.map((d, i) => {
        const t = (d.finishTime / 1000).toFixed(2);
        const mark = d.isPlayer ? ' ← あなた' : '';
        return `${medals[i]} ${d.name} <span>${t}秒</span>${mark}`;
      });
      document.getElementById('goStats').innerHTML = lines.join('<br>');

      if (playerRank === 1) {
        fetchLeaderboard().then(() => {
          document.getElementById('hsEntry').style.display = isHighScore(playerTime) ? 'block' : 'none';
        });
      } else {
        document.getElementById('hsEntry').style.display = 'none';
      }
      document.getElementById('hsSubmitted').style.display = 'none';
      document.getElementById('hsName').value = '';
      document.getElementById('gameoverOverlay').classList.add('active');
    }

    // ===== GAME FLOW =====
    let countdownText = '';

    function startCountdown() {
      state = 'countdown';
      overlayShown = false;
      scoreSubmitted = false;
      initDucks();

      countdownText = '3';
      playCountdown();
      setTimeout(() => {
        countdownText = '2';
        playCountdown();
        setTimeout(() => {
          countdownText = '1';
          playCountdown();
          setTimeout(() => {
            countdownText = 'GO!';
            playGo();
            state = 'racing';
            raceStartTime = performance.now();
            setTimeout(() => { countdownText = ''; }, 600);
          }, 800);
        }, 800);
      }, 800);
    }

    function reset() {
      state = 'waiting';
      initDucks();
      countdownText = '';
      playerTime = 0;
    }

    function hideOverlays() {
      document.getElementById('gameoverOverlay').classList.remove('active');
      document.getElementById('lbOverlay').classList.remove('active');
    }

    function restartGame() {
      hideOverlays();
      startCountdown();
    }

    // ===== INPUT =====
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (state === 'waiting') {
          startCountdown();
        } else if (state === 'racing') {
          tapDuck(ducks[0]);
          playTap();
        }
      }
    });

    canvas.addEventListener('click', () => {
      if (state === 'waiting') startCountdown();
    });

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (state === 'waiting') {
        startCountdown();
      } else if (state === 'racing') {
        tapDuck(ducks[0]);
        playTap();
      }
    }, { passive: false });

    // Touch button
    const btnTap = document.getElementById('btnTap');
    btnTap.addEventListener('touchstart', (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (state === 'waiting') {
        startCountdown();
      } else if (state === 'racing') {
        tapDuck(ducks[0]);
        playTap();
      }
      btnTap.classList.add('active');
    }, { passive: false });
    btnTap.addEventListener('touchend', (e) => {
      e.preventDefault();
      btnTap.classList.remove('active');
    }, { passive: false });
    btnTap.addEventListener('touchcancel', (e) => {
      e.preventDefault();
      btnTap.classList.remove('active');
    }, { passive: false });

    // Overlay buttons
    document.getElementById('goRestart').addEventListener('click', restartGame);
    document.getElementById('goLeaderboard').addEventListener('click', () => {
      fetchLeaderboard().then(() => showLeaderboardOverlay());
    });
    document.getElementById('hsSubmit').addEventListener('click', async () => {
      const name = document.getElementById('hsName').value.trim();
      if (name.length > 0 && !scoreSubmitted) {
        await submitScore(name, playerTime);
        document.getElementById('hsEntry').style.display = 'none';
        document.getElementById('hsSubmitted').style.display = 'block';
      }
    });
    document.getElementById('lbClose').addEventListener('click', () => {
      document.getElementById('lbOverlay').classList.remove('active');
    });
    document.getElementById('hsName').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); document.getElementById('hsSubmit').click(); }
    });

    document.addEventListener('keydown', e => {
      if (state !== 'finished') return;
      if (document.activeElement === document.getElementById('hsName')) return;
      if (e.code === 'KeyR') restartGame();
      if (e.code === 'KeyL') { fetchLeaderboard().then(() => showLeaderboardOverlay()); }
      if (e.code === 'Escape') document.getElementById('lbOverlay').classList.remove('active');
    });

    // ===== MAIN LOOP =====
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
      lastTime = timestamp;

      waveOffset += dt * 0.5;

      if (state === 'racing') {
        updateDucks(dt);
      }

      ctx.clearRect(0, 0, W, H);
      drawWater();
      ducks.forEach(drawDuck);
      if (state === 'finished' || state === 'racing') drawRankBadges();
      drawHUD();

      requestAnimationFrame(gameLoop);
    }

    // ===== INIT =====
    initDucks();
    fetchLeaderboard();
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
