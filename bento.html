<script>
"use strict";
// ============================================================
// アヒルの弁当屋 - Duck's Bento Shop Simulation
// ============================================================

const W = 480, H = 320;
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// --- Responsive scaling ---
const wrap = document.getElementById("wrap");
let forcedLandscape = false;

function resize() {
  let ww = window.innerWidth, wh = window.innerHeight;
  // If forced landscape (portrait mode with CSS rotation), swap dimensions
  if (forcedLandscape && wh > ww) {
    [ww, wh] = [wh, ww];
  }
  const scale = Math.min(ww / W, wh / H);
  canvas.style.width = (W * scale) + "px";
  canvas.style.height = (H * scale) + "px";
}

function tryLandscapeLock() {
  // Try orientation lock API (needs fullscreen on most browsers)
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock("landscape").catch(() => {});
  }
  // CSS fallback: force rotation in portrait
  if (window.innerHeight > window.innerWidth) {
    wrap.classList.add("force-landscape");
    forcedLandscape = true;
  }
  resize();
}

window.addEventListener("resize", () => {
  // Check if we still need forced landscape
  if (forcedLandscape && window.innerWidth > window.innerHeight) {
    wrap.classList.remove("force-landscape");
    forcedLandscape = false;
  } else if (!forcedLandscape && window.innerHeight > window.innerWidth) {
    wrap.classList.add("force-landscape");
    forcedLandscape = true;
  }
  resize();
});
resize();

// --- Input ---
const input = { x: -1, y: -1, tapped: false };

function getCanvasPos(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  if (forcedLandscape) {
    // CSS rotate(90deg) applies matrix [0,-1;1,0] (forward: x'=-y, y'=x)
    // Inverse: canvasX = screenY, canvasY = -screenX (relative to center)
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    const dx = clientX - cx;
    const dy = clientY - cy;
    // After 90deg rotation: r.height = original CSS width, r.width = original CSS height
    return {
      x: (dy + r.height / 2) * (W / r.height),
      y: (-dx + r.width / 2) * (H / r.width)
    };
  }
  return {
    x: (clientX - r.left) * (W / r.width),
    y: (clientY - r.top) * (H / r.height)
  };
}

canvas.addEventListener("mousedown", e => {
  const p = getCanvasPos(e.clientX, e.clientY);
  input.x = p.x; input.y = p.y; input.tapped = true;
});
canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  const t = e.touches[0];
  const p = getCanvasPos(t.clientX, t.clientY);
  input.x = p.x; input.y = p.y; input.tapped = true;
}, { passive: false });

// --- Pixel drawing helpers ---
function drawRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}

function drawText(text, x, y, color, size, align) {
  ctx.fillStyle = color || "#fff";
  ctx.font = (size || 8) + "px monospace";
  ctx.textAlign = align || "left";
  ctx.textBaseline = "top";
  ctx.fillText(text, Math.floor(x), Math.floor(y));
}

function hitTest(px, py, rx, ry, rw, rh) {
  return px >= rx && px < rx + rw && py >= ry && py < ry + rh;
}

// --- Draw pixel duck (mascot) ---
// animFrame: 0=normal, 1=wing up, 2=wing down
// facingLeft: if true, duck faces left (mirrored)
function drawDuck(x, y, scale, animFrame, facingLeft) {
  const s = scale || 1;
  const af = animFrame || 0;
  const dw = 15; // duck width in logical pixels
  const p = facingLeft
    ? (px, py, w, h, c) => drawRect(x + (dw - px - w) * s, y + py * s, w * s, h * s, c)
    : (px, py, w, h, c) => drawRect(x + px * s, y + py * s, w * s, h * s, c);
  // Body (yellow)
  p(2, 4, 8, 6, "#fc0");
  p(1, 5, 10, 4, "#fc0");
  // Head
  p(7, 0, 5, 5, "#fc0");
  p(6, 1, 6, 4, "#fc0");
  // Eye
  p(10, 2, 1, 1, "#222");
  // Beak (orange)
  p(12, 3, 3, 1, "#f80");
  p(12, 4, 2, 1, "#f80");
  // Wing (animated)
  if (af === 1) {
    p(3, 3, 4, 2, "#ea0"); // wing up
  } else if (af === 2) {
    p(3, 7, 4, 2, "#ea0"); // wing down
  } else {
    p(3, 5, 4, 3, "#ea0"); // wing normal
  }
  // Tail
  p(0, 3, 2, 2, "#ea0");
  // Feet
  p(4, 10, 2, 1, "#f80");
  p(8, 10, 2, 1, "#f80");
}

// --- Duck mascot state ---
const duckMascot = {
  animTimer: 0,
  animFrame: 0,
  bobTimer: 0,
  speech: "",
  speechTimer: 0,
  speechQueue: [],
  lookTimer: 0,
  facingLeft: false,
};

const DUCK_SPEECH_SELL = [
  "まいどぐわ！", "ありがとぐわ〜", "おいしいぐわよ！",
  "毎度ありぐわ！", "またきてぐわ！",
];
const DUCK_SPEECH_OPEN = [
  "いらっしゃいぐわ！", "お弁当あるぐわよ〜", "開店ぐわ！",
  "よってらっしゃいぐわ！",
];
const DUCK_SPEECH_SOLDOUT = [
  "売り切れぐわ…", "ごめんぐわ〜", "また明日ぐわ！",
];
const DUCK_SPEECH_IDLE = [
  "ぐわぐわ♪", "いい天気ぐわ〜", "ぐわっ", "お弁当いかがぐわ？",
];

function triggerDuckSpeech(text) {
  if (duckMascot.speechTimer <= 0) {
    duckMascot.speech = text;
    duckMascot.speechTimer = 1500;
  } else {
    // Queue it
    if (duckMascot.speechQueue.length < 3) {
      duckMascot.speechQueue.push(text);
    }
  }
}

function updateDuckMascot(dt) {
  duckMascot.animTimer += dt;
  duckMascot.bobTimer += dt;
  // Wing flap cycle: 0→1→0→2→0 every 600ms
  const cycle = Math.floor(duckMascot.animTimer / 300) % 4;
  duckMascot.animFrame = [0, 1, 0, 2][cycle];
  // Look left/right
  duckMascot.lookTimer += dt;
  if (duckMascot.lookTimer > 2500 + Math.sin(duckMascot.animTimer / 1000) * 1000) {
    duckMascot.lookTimer = 0;
    duckMascot.facingLeft = !duckMascot.facingLeft;
  }
  // Speech timer
  if (duckMascot.speechTimer > 0) {
    duckMascot.speechTimer -= dt;
    if (duckMascot.speechTimer <= 0 && duckMascot.speechQueue.length > 0) {
      duckMascot.speech = duckMascot.speechQueue.shift();
      duckMascot.speechTimer = 1500;
    }
  }
}

// --- Bento types (6 kinds with progressive unlock) ---
// Unlock thresholds tuned for multi-day progression
const BENTO_TYPES = [
  { id: "nori",     name: "のり弁",       cost: 200, price: 350, color: "#2a5c1a", unlockProfit: 0 },
  { id: "sake",     name: "鮭弁",         cost: 300, price: 500, color: "#e06050", unlockProfit: 0 },
  { id: "karaage",  name: "唐揚げ弁当",   cost: 350, price: 550, color: "#c89030", unlockProfit: 8000 },
  { id: "tonkatsu", name: "とんかつ弁当",  cost: 400, price: 650, color: "#b07030", unlockProfit: 30000 },
  { id: "makunouchi",name: "幕の内弁当",   cost: 500, price: 800, color: "#d04848", unlockProfit: 100000 },
  { id: "special",  name: "アヒル特製弁当",cost: 600, price:1000, color: "#e0a020", unlockProfit: 300000 },
];

// Max restocks per day (morning counts as 1)
const MAX_RESTOCKS_PER_DAY = 5;
const MAX_DAYS = 3;

// --- Nobori types ---
const NOBORI_TYPES = [
  { id: "standard", name: "標準ノボリ", cost: 800, spawnMult: 0.75, buyBonus: 0.10 },
  { id: "duck",     name: "アヒル型",   cost: 1500, spawnMult: 0.60, buyBonus: 0.15 },
];

// --- NPC sprite definitions ---
const NPC_STYLES = [
  { head: "#fdd", body: "#448", hair: "#432", tall: 0 },
  { head: "#fed", body: "#844", hair: "#222", tall: 0 },
  { head: "#fdd", body: "#484", hair: "#654", tall: 1 },
  { head: "#fed", body: "#c44", hair: "#111", tall: 0 },
  { head: "#fdd", body: "#66a", hair: "#543", tall: 0 },
  { head: "#edc", body: "#4a4", hair: "#333", tall: 1 },
  { head: "#fdd", body: "#a4a", hair: "#432", tall: 0 },
  { head: "#fed", body: "#48a", hair: "#222", tall: 0 },
  { head: "#fcc", body: "#a66", hair: "#543", tall: 1 },
  { head: "#fed", body: "#688", hair: "#321", tall: 0 },
  { head: "#edb", body: "#864", hair: "#111", tall: 0 },
  { head: "#fdd", body: "#c68", hair: "#432", tall: 1 },
  { head: "#fcc", body: "#446", hair: "#654", tall: 0 },
  { head: "#fed", body: "#686", hair: "#333", tall: 0 },
  { head: "#edc", body: "#468", hair: "#222", tall: 1 },
  { head: "#fdd", body: "#864", hair: "#543", tall: 0 },
];

// --- Reputation ranks ---
const REP_RANKS = [
  { min: 0,  label: "閑古鳥",   color: "#888", icon: "..." },
  { min: 15, label: "不評",     color: "#c44", icon: "..." },
  { min: 30, label: "いまいち", color: "#c84", icon: "..." },
  { min: 45, label: "普通",     color: "#cc4", icon: "..." },
  { min: 55, label: "まあまあ", color: "#ac4", icon: "..." },
  { min: 65, label: "好評",     color: "#4c4", icon: "..." },
  { min: 75, label: "人気店",   color: "#4ca", icon: "..." },
  { min: 85, label: "大繁盛",   color: "#4cf", icon: "..." },
  { min: 95, label: "伝説の店", color: "#f4f", icon: "..." },
];

function getRepRank(rep) {
  let rank = REP_RANKS[0];
  for (const r of REP_RANKS) {
    if (rep >= r.min) rank = r;
  }
  return rank;
}

// --- Game Clock ---
class GameClock {
  constructor() {
    this.hour = 6;
    this.minute = 0;
    this.speed = 1;
    this.acc = 0;
  }

  reset() { this.hour = 6; this.minute = 0; this.acc = 0; }

  update(dt) {
    this.acc += dt;
    const step = 1000 / this.speed;
    while (this.acc >= step) {
      this.acc -= step;
      this.minute++;
      if (this.minute >= 60) {
        this.minute = 0;
        this.hour++;
      }
    }
  }

  totalMinutes() { return this.hour * 60 + this.minute; }
  isOpen() { return this.hour >= 6 && this.hour < 22; }

  timeString() {
    return String(this.hour).padStart(2, "0") + ":" + String(this.minute).padStart(2, "0");
  }
}

// --- Shop ---
class Shop {
  constructor() {
    this.money = 3000;
    this.totalProfit = 0;
    this.inventory = {};
    this.dayRevenue = 0;
    this.dayCost = 0;
    this.daySold = 0;
    this.dayMissed = 0;
    this.dayWasted = 0;
    this.dayWastedCost = 0;
    this.noboriType = null; // null or NOBORI_TYPES element
    this.reputation = 50;
    this.soldoutTime = 0;
    this.restocksToday = 0; // how many times restocked today
    this.profitAtDayStart = this.totalProfit; // snapshot for unlock gating
    BENTO_TYPES.forEach(b => this.inventory[b.id] = 0);
  }

  canRestock() { return this.restocksToday < MAX_RESTOCKS_PER_DAY; }
  restocksLeft() { return MAX_RESTOCKS_PER_DAY - this.restocksToday; }

  // Daily rent: increases as your shop grows
  getDailyRent(day) {
    if (day <= 2) return 0; // free first 2 days
    return Math.min(2000, 300 + (day - 3) * 100);
  }

  totalStock() {
    let s = 0;
    for (const k in this.inventory) s += this.inventory[k];
    return s;
  }

  // During gameplay, only show bentos unlocked before today
  // In summary/purchase-after-summary, show all unlocked
  unlockedBentos(useDayStart) {
    const profit = useDayStart ? (this.profitAtDayStart || 0) : this.totalProfit;
    return BENTO_TYPES.filter(b => profit >= b.unlockProfit);
  }

  buyStock(id, qty) {
    const b = BENTO_TYPES.find(t => t.id === id);
    if (!b) return false;
    const total = b.cost * qty;
    if (total > this.money) return false;
    this.money -= total;
    this.dayCost += total;
    this.inventory[id] = (this.inventory[id] || 0) + qty;
    return true;
  }

  sellOne() {
    const avail = [];
    for (const k in this.inventory) {
      if (this.inventory[k] > 0) avail.push(k);
    }
    if (avail.length === 0) return null;
    const id = avail[Math.floor(Math.random() * avail.length)];
    const b = BENTO_TYPES.find(t => t.id === id);
    this.inventory[id]--;
    this.money += b.price;
    this.dayRevenue += b.price;
    this.daySold++;
    this.totalProfit += (b.price - b.cost);
    this.reputation = Math.min(100, this.reputation + 0.3);
    return b;
  }

  spoilLeftovers() {
    let wasted = 0;
    let wastedCost = 0;
    for (const bt of BENTO_TYPES) {
      const count = this.inventory[bt.id] || 0;
      if (count > 0) {
        wasted += count;
        wastedCost += count * bt.cost;
      }
    }
    this.dayWasted = wasted;
    this.dayWastedCost = wastedCost;
    if (wasted > 0) {
      this.reputation = Math.max(0, this.reputation - wasted * 0.8);
    }
  }

  decayReputation() {
    if (this.reputation > 50) {
      this.reputation = Math.max(50, this.reputation - 0.02);
    } else if (this.reputation < 50) {
      this.reputation = Math.min(50, this.reputation + 0.01);
    }
  }

  // Check newly unlocked bentos this turn
  checkNewUnlocks(prevProfit) {
    const newUnlocks = [];
    for (const b of BENTO_TYPES) {
      if (this.totalProfit >= b.unlockProfit && prevProfit < b.unlockProfit && b.unlockProfit > 0) {
        newUnlocks.push(b);
      }
    }
    return newUnlocks;
  }

  resetDay() {
    this.dayRevenue = 0;
    this.dayCost = 0;
    this.daySold = 0;
    this.dayMissed = 0;
    this.dayWasted = 0;
    this.dayWastedCost = 0;
    this.soldoutTime = 0;
    this.noboriType = null;
    this.restocksToday = 0;
    this.profitAtDayStart = this.totalProfit; // snapshot for unlock gating
    for (const k in this.inventory) this.inventory[k] = 0;
  }
}

// --- NPC speech lines ---
const SPEECH_APPROACH = [
  "おっ弁当屋だ", "お腹すいた…", "いい匂い！", "弁当あるかな",
  "ちょうどよかった", "おっ", "何があるかな",
];
const SPEECH_BUY = {
  nori:      ["のり弁ゲット！", "のり弁にしよ", "定番だね", "のり弁♪"],
  sake:      ["鮭弁うまそう", "鮭！鮭！", "これにしよっと", "鮭弁ください"],
  karaage:   ["あ、唐揚げか…", "唐揚げ弁当！", "唐揚げ最高", "ボリューム！"],
  tonkatsu:  ["とんかつだ！", "がっつり！", "カツ弁当♪", "うまそう！"],
  makunouchi:["幕の内だ！", "豪華だなぁ", "贅沢しよう", "これは良い"],
  special:   ["アヒル特製!?", "噂のやつだ！", "これ食べたかった", "特製弁当♪"],
};
const SPEECH_SOLDOUT_SAD = ["売り切れか…", "もうないの？", "残念…", "えー…"];
const SPEECH_SOLDOUT_HYPE = ["人気店なんだ", "すごい人気だな", "次は早く来よう", "有名な店？"];
const SPEECH_NOBORI = ["のぼりが出てる", "あそこ弁当屋だ", "お、弁当！", "寄ってこうかな"];
const SPEECH_PASSBY = ["…", "急がなきゃ", "今日は忙しい"];

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// --- NPC ---
class NPC {
  constructor(x, dir, style) {
    this.x = x;
    this.y = 220;
    this.dir = dir;
    this.speed = 20 + Math.random() * 15;
    this.style = style;
    this.frame = 0;
    this.frameTimer = 0;
    this.state = "walking";
    this.stopTimer = 0;
    this.bought = null;
    this.wantsToBuy = false;
    this.speech = "";
    this.speechTimer = 0;
    this.passedShop = false;
    this.noticedNobori = false;
  }

  setSpeech(text, duration) {
    this.speech = text;
    this.speechTimer = duration || 1200;
  }

  update(dt, shopX, shop) {
    this.frameTimer += dt;
    if (this.frameTimer > 300) {
      this.frameTimer = 0;
      this.frame = 1 - this.frame;
    }

    if (this.speechTimer > 0) this.speechTimer -= dt;

    const shopZone = shopX + 40;

    if (this.state === "walking") {
      this.x += this.dir * this.speed * dt / 1000;

      // Notice nobori from distance
      if (!this.noticedNobori && shop.noboriType) {
        const dist = Math.abs(this.x - shopZone);
        const noticeRange = shop.noboriType.id === "duck" ? 100 : 80;
        if (dist < noticeRange && dist > 40) {
          this.noticedNobori = true;
          const convertChance = shop.noboriType.id === "duck" ? 0.35 : 0.25;
          if (!this.wantsToBuy && Math.random() < convertChance) {
            this.wantsToBuy = true;
            this.setSpeech(pickRandom(SPEECH_NOBORI), 1000);
          } else if (this.wantsToBuy && Math.random() < 0.4) {
            this.setSpeech(pickRandom(SPEECH_NOBORI), 1000);
          }
        }
      }

      // Near shop
      if (Math.abs(this.x - shopZone) < 8 && !this.passedShop) {
        if (this.wantsToBuy && shop.totalStock() > 0) {
          this.state = "stopping";
          this.stopTimer = 1200;
          this.setSpeech(pickRandom(SPEECH_APPROACH), 800);
        } else if (this.wantsToBuy && shop.totalStock() === 0) {
          this.passedShop = true;
          shop.dayMissed++;
          const sellRate = shop.daySold / Math.max(1, shop.daySold + shop.dayMissed);
          if (sellRate > 0.6 && shop.daySold >= 15) {
            shop.reputation = Math.min(100, shop.reputation + 0.4);
            this.setSpeech(pickRandom(Math.random() < 0.5 ? SPEECH_SOLDOUT_HYPE : SPEECH_SOLDOUT_SAD), 1200);
          } else {
            shop.reputation = Math.max(0, shop.reputation - 1.2);
            if (Math.random() < 0.7) this.setSpeech(pickRandom(SPEECH_SOLDOUT_SAD), 1200);
          }
        } else {
          this.passedShop = true;
          if (Math.random() < 0.12) this.setSpeech(pickRandom(SPEECH_PASSBY), 800);
        }
      }
    } else if (this.state === "stopping") {
      this.stopTimer -= dt;
      if (this.stopTimer <= 0) {
        if (shop.totalStock() > 0) {
          this.bought = shop.sellOne();
          if (this.bought) {
            const lines = SPEECH_BUY[this.bought.id] || ["おいしそう"];
            this.setSpeech(pickRandom(lines), 1200);
          }
        } else {
          shop.dayMissed++;
          shop.reputation = Math.max(0, shop.reputation - 1.5);
          this.setSpeech(pickRandom(SPEECH_SOLDOUT_SAD), 1200);
        }
        this.state = "leaving";
        this.stopTimer = 1000;
        this.passedShop = true;
      }
    } else if (this.state === "leaving") {
      this.stopTimer -= dt;
      if (this.stopTimer <= 0) {
        this.state = "walking";
        this.wantsToBuy = false;
      }
    }
  }

  isOffscreen() { return this.x < -20 || this.x > W + 20; }

  draw() {
    const sx = Math.floor(this.x);
    const tall = this.style.tall || 0;
    const sy = this.y - tall * 3;
    const s = this.style;
    const f = this.frame;

    drawRect(sx + 1, sy, 6, 3, s.hair);
    drawRect(sx + 1, sy + 3, 6, 5, s.head);
    drawRect(sx + 2, sy + 5, 1, 1, "#222");
    drawRect(sx + 5, sy + 5, 1, 1, "#222");
    drawRect(sx + 1, sy + 8, 6, 5 + tall * 3, s.body);
    const legY = sy + 13 + tall * 3;
    if (this.state === "walking" || this.state === "leaving") {
      if (f === 0) {
        drawRect(sx + 1, legY, 2, 3, "#444");
        drawRect(sx + 5, legY, 2, 3, "#444");
      } else {
        drawRect(sx + 0, legY, 2, 3, "#444");
        drawRect(sx + 6, legY, 2, 3, "#444");
      }
    } else {
      drawRect(sx + 1, legY, 2, 3, "#444");
      drawRect(sx + 5, legY, 2, 3, "#444");
    }

    // Speech bubble (clamped)
    if (this.speechTimer > 0 && this.speech) {
      const text = this.speech;
      const tw = text.length * 7 + 6;
      let bx = sx - tw / 2 + 4;
      const by = sy - 16;
      if (bx < 2) bx = 2;
      if (bx + tw > W - 2) bx = W - 2 - tw;
      drawRect(bx, by, tw, 12, "#fff");
      drawRect(sx + 3, by + 12, 2, 2, "#fff");
      drawText(text, bx + 3, by + 2, "#333", 7);
    }

    if (this.state === "leaving" && this.bought && this.stopTimer > 600) {
      drawRect(sx - 2, sy - 6, 6, 4, this.bought.color);
    }
  }
}

// --- NPC Manager ---
class NPCManager {
  constructor() { this.npcs = []; this.spawnTimer = 0; }
  reset() { this.npcs = []; this.spawnTimer = 0; }

  getSpawnRate(hour, noboriType) {
    let rate;
    if (hour >= 11 && hour < 14) rate = 1200;
    else if (hour >= 17 && hour < 20) rate = 1500;
    else if (hour >= 8 && hour < 11) rate = 2000;
    else if (hour >= 14 && hour < 17) rate = 2000;
    else rate = 3500;
    if (noboriType) rate *= noboriType.spawnMult;
    return rate;
  }

  getBuyChance(hour, noboriType, reputation) {
    let chance;
    if (hour >= 11 && hour < 14) chance = 0.55;
    else if (hour >= 17 && hour < 20) chance = 0.45;
    else if (hour >= 8 && hour < 11) chance = 0.35;
    else if (hour >= 14 && hour < 17) chance = 0.30;
    else chance = 0.20;
    if (noboriType) chance += noboriType.buyBonus;
    if (flyerEvent.boostTimer > 0) chance += 0.15;
    chance *= 0.7 + (reputation / 100) * 0.5;
    return Math.min(chance, 0.80);
  }

  update(dt, clock, shop, shopX) {
    const hour = clock.hour;
    this.spawnTimer -= dt * clock.speed;

    if (this.spawnTimer <= 0 && clock.isOpen()) {
      this.spawnTimer = this.getSpawnRate(hour, shop.noboriType);
      const dir = Math.random() < 0.5 ? 1 : -1;
      const x = dir === 1 ? -10 : W + 10;
      const style = NPC_STYLES[Math.floor(Math.random() * NPC_STYLES.length)];
      const npc = new NPC(x, dir, style);
      npc.wantsToBuy = Math.random() < this.getBuyChance(hour, shop.noboriType, shop.reputation);
      this.npcs.push(npc);
    }

    for (const npc of this.npcs) npc.update(dt, shopX, shop);
    this.npcs = this.npcs.filter(n => !n.isOffscreen());
  }

  draw() { for (const npc of this.npcs) npc.draw(); }
}

// --- Sky ---
function lerpColor(a, b, t) {
  const ar = parseInt(a.slice(1,3),16), ag = parseInt(a.slice(3,5),16), ab = parseInt(a.slice(5,7),16);
  const br = parseInt(b.slice(1,3),16), bg = parseInt(b.slice(3,5),16), bb = parseInt(b.slice(5,7),16);
  const r = Math.round(ar + (br - ar) * t);
  const g = Math.round(ag + (bg - ag) * t);
  const bl = Math.round(ab + (bb - ab) * t);
  return "#" + ((1<<24)+(r<<16)+(g<<8)+bl).toString(16).slice(1);
}

function getSkyColors(hour, minute) {
  const t = hour + minute / 60;
  const stops = [
    [5,  "#0a0a2e", "#1a1a3e"], [6,  "#1a1040", "#3a2050"],
    [7,  "#f06830", "#ffb040"], [8,  "#4090e0", "#80c0f0"],
    [12, "#3080d0", "#70b8f0"], [17, "#3080d0", "#70b8f0"],
    [18, "#e06030", "#ff9040"], [19, "#802040", "#d04830"],
    [20, "#1a1040", "#2a1850"], [22, "#0a0a2e", "#1a1a3e"],
  ];
  let i = 0;
  for (; i < stops.length - 1; i++) { if (t < stops[i + 1][0]) break; }
  if (i >= stops.length - 1) i = stops.length - 2;
  const s0 = stops[i], s1 = stops[i + 1];
  const frac = (t - s0[0]) / (s1[0] - s0[0]);
  return { top: lerpColor(s0[1], s1[1], frac), bottom: lerpColor(s0[2], s1[2], frac) };
}

function drawSky(hour, minute) {
  const colors = getSkyColors(hour, minute);
  for (let y = 0; y < 200; y++) {
    drawRect(0, y, W, 1, lerpColor(colors.top, colors.bottom, y / 200));
  }
}

}

// --- Purchase Modal Logic ---
class PurchaseModal {
  constructor() { this.quantities = {}; this.active = false; }

  open(shop, useDayStart) {
    this.active = true;
    this.useDayStart = useDayStart || false;
    this.quantities = {};
    for (const bt of shop.unlockedBentos(this.useDayStart)) this.quantities[bt.id] = 0;
  }

  close() { this.active = false; }

  totalCost(shop) {
    let total = 0;
    for (const bt of shop.unlockedBentos(this.useDayStart)) total += (this.quantities[bt.id] || 0) * bt.cost;
    return total;
  }

  handleTap(x, y, shop) {
    const mx = 60, my = 16, mw = 360, mh = 288;
    const unlocked = shop.unlockedBentos(this.useDayStart);
    const rowH = 34;
    const startY = my + 26;
    const bx = mx + 220;

    for (let row = 0; row < unlocked.length; row++) {
      const bt = unlocked[row];
      const ry = startY + row * rowH;

      if (hitTest(x, y, bx, ry, 20, 20)) {
        this.quantities[bt.id] = Math.max(0, (this.quantities[bt.id] || 0) - 1); return;
      }
      if (hitTest(x, y, bx + 58, ry, 20, 20)) {
        this.quantities[bt.id] = (this.quantities[bt.id] || 0) + 1; return;
      }
      if (hitTest(x, y, bx + 82, ry, 24, 20)) {
        this.quantities[bt.id] = (this.quantities[bt.id] || 0) + 5; return;
      }
    }

    const bottomY = my + mh - 40;
    if (hitTest(x, y, mx + 60, bottomY + 16, 80, 20)) {
      const totalCost = this.totalCost(shop);
      if (totalCost <= shop.money && totalCost > 0) {
        for (const bt of shop.unlockedBentos(this.useDayStart)) {
          const qty = this.quantities[bt.id] || 0;
          if (qty > 0) shop.buyStock(bt.id, qty);
        }
        shop.restocksToday++;
        this.close();
      }
      return;
    }
    if (hitTest(x, y, mx + 200, bottomY + 16, 80, 20)) { this.close(); return; }
  }
}

// --- Title Screen ---
function drawTitleScreen(blink) {
  for (let y = 0; y < H; y++) {
    drawRect(0, y, W, 1, lerpColor("#f06830", "#ffb040", y / H));
  }

  drawRect(10, 100, 50, 220, "#301810");
  drawRect(70, 140, 40, 180, "#2a1510");
  drawRect(340, 90, 60, 230, "#301810");
  drawRect(420, 130, 50, 190, "#2a1510");

  drawRect(170, 180, 140, 60, "#402820");
  drawRect(165, 172, 150, 12, "#602020");

  // Big duck on title (animated)
  const titleBob = Math.sin(Date.now() / 400) * 3;
  const titleFrame = [0, 1, 0, 2][Math.floor(Date.now() / 300) % 4];
  drawDuck(W / 2 - 30, 90 + titleBob, 3, titleFrame);

  drawText("アヒルの弁当屋", W / 2 - 60, 40, "#fff", 16);
  drawText("〜 3日間チャレンジ 〜", W / 2 - 60, 62, "#fda", 10);
  drawText("3日間でたくさん売って利益を出そう！", W / 2 - 100, 250, "#fda", 8);

  if (blink) {
    drawText("タップでスタート", W / 2 - 50, 270, "#fff", 10);
  }
}

// --- Flyer event ---
const flyerEvent = {
  active: false,
  timer: 0,
  duckX: -20,
  bentoName: "",
  boostTimer: 0, // remaining boost time in game-minutes
};

function startFlyerEvent(bentoName) {
  flyerEvent.active = true;
  flyerEvent.timer = 4000; // 4 seconds of duck walking
  flyerEvent.duckX = -20;
  flyerEvent.bentoName = bentoName;
  flyerEvent.boostTimer = 60; // 60 game-minutes of boosted buy chance
}

function updateFlyerEvent(dt, clockSpeed) {
  if (flyerEvent.active) {
    flyerEvent.timer -= dt;
    flyerEvent.duckX += dt * 0.1; // walk across screen
    if (flyerEvent.timer <= 0) {
      flyerEvent.active = false;
    }
  }
  if (flyerEvent.boostTimer > 0) {
    flyerEvent.boostTimer -= dt * clockSpeed / 1000;
  }
}

function drawFlyerEvent() {
  if (!flyerEvent.active) return;
  const dx = Math.floor(flyerEvent.duckX);
  const dy = 215;
  const af = [0, 1, 0, 2][Math.floor(Date.now() / 200) % 4];
  drawDuck(dx, dy, 1, af);
  // Flyer in beak
  drawRect(dx + 13, dy + 2, 6, 4, "#fff");
  drawRect(dx + 14, dy + 3, 4, 2, "#f44");
  // Text banner
  const text = "★新メニュー「" + flyerEvent.bentoName + "」！";
  const tw = text.length * 7 + 8;
  const bx = Math.max(2, Math.min(dx - tw / 2 + 8, W - tw - 2));
  drawRect(bx, dy - 16, tw, 13, "#f44");
  drawText(text, bx + 4, dy - 14, "#fff", 8);
}

// --- Leaderboard ---
const BENTO_API = '/api/bento-scores';
let bentoLeaderboard = [];
let bentoSubmitted = false;
let bentoPlayerName = '';
let bentoLbLoading = false;

function fetchBentoLeaderboard() {
  bentoLbLoading = true;
  fetch(BENTO_API)
    .then(r => r.json())
    .then(data => { bentoLeaderboard = data || []; bentoLbLoading = false; })
    .catch(() => { bentoLeaderboard = []; bentoLbLoading = false; });
}

function submitBentoScore(name, score, reputation) {
  fetch(BENTO_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, score, reputation })
  })
    .then(r => r.json())
    .then(data => { bentoLeaderboard = data || []; bentoSubmitted = true; })
    .catch(() => {});
}

// --- Main Game ---
class Game {
  constructor() {
    this.state = "title";
    this.clock = new GameClock();
    this.shop = new Shop();
    this.npcManager = new NPCManager();
    this.purchaseModal = new PurchaseModal();
    this.day = 1;
    this.paused = false;
    this.blinkTimer = 0;
    this.blinkOn = true;
    this.lastClockMinute = -1;
    this.newUnlocks = [];
    this.dayRent = 0;
    this.pendingFlyer = null; // bento name to distribute flyers for next day
    this.totalSold = 0;
  }

  startDay() {
    this.clock.reset();
    this.npcManager.reset();
    this.lastClockMinute = -1;
    this.newUnlocks = [];
    // Pay daily rent
    const rent = this.shop.getDailyRent(this.day);
    if (rent > 0) {
      this.shop.money -= rent;
      this.shop.dayCost += rent;
      this.dayRent = rent;
    } else {
      this.dayRent = 0;
    }
    // Start flyer event if new bento was unlocked yesterday
    if (this.pendingFlyer) {
      startFlyerEvent(this.pendingFlyer);
      this.pendingFlyer = null;
    }
    this.state = "purchase";
    this.purchaseModal.open(this.shop, true);
  }

  update(dt) {
    this.blinkTimer += dt;
    if (this.blinkTimer > 500) {
      this.blinkTimer = 0;
      this.blinkOn = !this.blinkOn;
    }

    if (this.state !== "playing" || this.paused) return;

    updateDuckMascot(dt);
    updateFlyerEvent(dt, this.clock.speed);
    this.clock.update(dt);

    // Duck idle chatter (infrequent)
    if (!this.duckIdleTimer) this.duckIdleTimer = 15000 + Math.random() * 20000;
    this.duckIdleTimer -= dt;
    if (this.duckIdleTimer <= 0) {
      this.duckIdleTimer = 15000 + Math.random() * 20000;
      if (this.shop.totalStock() === 0 && this.shop.daySold > 0) {
        triggerDuckSpeech(pickRandom(DUCK_SPEECH_SOLDOUT));
      } else if (this.shop.totalStock() > 0) {
        triggerDuckSpeech(pickRandom(DUCK_SPEECH_IDLE));
      }
    }

    // Track previous sold count to detect new sales (only speak occasionally)
    const prevSold = this.shop.daySold;
    this.npcManager.update(dt, this.clock, this.shop, SHOP_X);
    if (this.shop.daySold > prevSold && Math.random() < 0.3) {
      triggerDuckSpeech(pickRandom(DUCK_SPEECH_SELL));
    }

    const curMin = this.clock.totalMinutes();
    if (curMin !== this.lastClockMinute) {
      this.lastClockMinute = curMin;
      this.shop.decayReputation();
      if (this.shop.totalStock() === 0 && this.shop.daySold > 0) {
        this.shop.soldoutTime++;
        if (this.shop.soldoutTime > 30) {
          this.shop.reputation = Math.max(0, this.shop.reputation - 0.15);
        }
      }
    }

    if (this.clock.hour >= 22) {
      const prevProfit = this.shop.totalProfit - (this.shop.dayRevenue - this.shop.dayCost);
      this.shop.spoilLeftovers();
      this.newUnlocks = this.shop.checkNewUnlocks(prevProfit);
      if (this.newUnlocks.length > 0) {
        this.pendingFlyer = this.newUnlocks[this.newUnlocks.length - 1].name;
      }
      this.state = "summary";
    }
  }

  handleTap(x, y) {
    if (this.state === "title") { tryLandscapeLock(); this.startDay(); return; }

    if (this.state === "purchase") {
      this.purchaseModal.handleTap(x, y, this.shop);
      if (!this.purchaseModal.active) {
        this.state = "playing";
        triggerDuckSpeech(pickRandom(DUCK_SPEECH_OPEN));
      }
      return;
    }

    if (this.state === "summary") {
      const mx = 80, my = 20, mw = 320, mh = 280;
      if (hitTest(x, y, mx + 100, my + mh - 32, 120, 24)) {
        this.totalSold += this.shop.daySold;
        if (this.day >= MAX_DAYS) {
          this.state = "gameover";
          fetchBentoLeaderboard();
        } else {
          this.day++;
          this.shop.resetDay();
          this.startDay();
        }
      }
      return;
    }

    if (this.state === "gameover") {
      const by = 252;
      if (!bentoSubmitted && hitTest(x, y, 30, by, 180, 22)) {
        const name = prompt("名前を入力（15文字まで）");
        if (name && name.trim()) {
          bentoPlayerName = name.trim();
          const rank = getRepRank(this.shop.reputation);
          submitBentoScore(bentoPlayerName, this.shop.totalProfit, rank.label);
        }
        return;
      }
      if (hitTest(x, y, 270, by, 180, 22)) {
        this.shop = new Shop();
        this.day = 1;
        this.totalSold = 0;
        this.paused = false;
        this.newUnlocks = [];
        this.pendingFlyer = null;
        bentoSubmitted = false;
        this.state = "title";
        return;
      }
      return;
    }

    if (this.state === "playing") {
      // 仕入れ (営業中は今日のラインナップのみ)
      if (hitTest(x, y, 320, UI_Y + 4, 46, 18)) {
        if (this.shop.canRestock()) {
          this.state = "purchase";
          this.purchaseModal.open(this.shop, true);
        }
        return;
      }
      // ノボリ: cycle OFF → standard → duck → OFF
      if (hitTest(x, y, 370, UI_Y + 4, 60, 18)) {
        if (this.shop.noboriType) {
          if (this.shop.noboriType.id === "standard") {
            // Upgrade to duck type (pay difference)
            const duckType = NOBORI_TYPES[1];
            const diff = duckType.cost - this.shop.noboriType.cost;
            if (this.shop.money >= diff) {
              this.shop.money -= diff;
              this.shop.dayCost += diff;
              this.shop.noboriType = duckType;
            }
          } else {
            // Turn off
            this.shop.noboriType = null;
          }
        } else {
          const stdType = NOBORI_TYPES[0];
          if (this.shop.money >= stdType.cost) {
            this.shop.money -= stdType.cost;
            this.shop.dayCost += stdType.cost;
            this.shop.noboriType = stdType;
          }
        }
        return;
      }
      // 早じまい (close early)
      if (hitTest(x, y, 434, UI_Y + 4, 42, 18)) {
        if (this.shop.daySold > 0) {
          const prevProfit = this.shop.totalProfit - (this.shop.dayRevenue - this.shop.dayCost);
          this.shop.spoilLeftovers();
          this.newUnlocks = this.shop.checkNewUnlocks(prevProfit);
          if (this.newUnlocks.length > 0) {
            this.pendingFlyer = this.newUnlocks[this.newUnlocks.length - 1].name;
          }
          this.state = "summary";
        }
        return;
      }
      // 一時停止
      if (hitTest(x, y, 320, UI_Y + 26, 50, 18)) { this.paused = !this.paused; return; }
      // 速度
      if (hitTest(x, y, 414, UI_Y + 26, 18, 18)) { this.clock.speed = 1; return; }
      if (hitTest(x, y, 436, UI_Y + 26, 18, 18)) { this.clock.speed = 3; return; }
      if (hitTest(x, y, 458, UI_Y + 26, 18, 18)) { this.clock.speed = 5; return; }
    }
  }

  draw() {
    ctx.setTransform(2, 0, 0, 2, 0, 0);
    ctx.clearRect(0, 0, W, H);

    if (this.state === "title") { drawTitleScreen(this.blinkOn); return; }
    if (this.state === "gameover") { drawGameOverScreen(this); return; }

    drawSky(this.clock.hour, this.clock.minute);
    drawBuildings(this.clock.hour);
    drawRoad();
    drawShop(this.shop, this.clock);
    this.npcManager.draw();
    drawFlyerEvent();
    drawUIPanel(this.shop, this.clock, this);

    if (this.state === "purchase") drawPurchaseModal(this.shop, this.purchaseModal);
    else if (this.state === "summary") drawSummaryModal(this.shop, this);

    if (this.paused && this.state === "playing") {
      ctx.fillStyle = "rgba(0,0,0,0.3)";
      ctx.fillRect(0, 0, W, UI_Y);
      drawText("⏸ 一時停止中", W / 2 - 40, 130, "#fff", 12);
    }
  }
}

// --- Game loop ---
const game = new Game();
let lastTime = performance.now();

function loop(now) {
  const dt = Math.min(now - lastTime, 100);
  lastTime = now;

  if (input.tapped) { game.handleTap(input.x, input.y); input.tapped = false; }
  game.update(dt);
  game.draw();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
