let leaderboard = [];
let scoreSubmitted = false;

async function fetchLeaderboard() {
  try { const r = await fetch('/api/ducklife-scores'); if (r.ok) leaderboard = await r.json(); } catch(e){}
}

async function submitScore(name, score, job, rank) {
  try {
    const r = await fetch('/api/ducklife-scores', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name, score, job, rank })
    });
    if (r.ok) { leaderboard = await r.json(); scoreSubmitted = true; }
  } catch(e){}
}

function isHighScore(score) {
  if (leaderboard.length < 20) return score > 0;
  return score > leaderboard[leaderboard.length-1].score;
}

function showLeaderboardOverlay() {
  const list = document.getElementById('lbList');
  if (leaderboard.length === 0) {
    list.innerHTML = '<div class="lb-empty">まだスコアがありません</div>';
  } else {
    list.innerHTML = leaderboard.slice(0, 20).map((e, i) => {
      const medal = i===0?'👑':i===1?'🥈':i===2?'🥉':`${i+1}.`;
      const jobText = e.job ? ` ${e.job}` : '';
      return `<div class="lb-row ${i<3?'top3':''}"><span class="rank">${medal}</span><span class="name">${e.name}</span><span class="score">${e.score.toLocaleString()}点${jobText}</span></div>`;
    }).join('');
  }
  document.getElementById('lbOverlay').classList.add('active');
}

document.getElementById('lbClose').addEventListener('click', () => document.getElementById('lbOverlay').classList.remove('active'));
fetchLeaderboard();

function getJobCostume() {
  if (!G.job) return null;
  const map = {
    cook: 'chef', patissier: 'chef', artist: 'artist', architect: 'builder',
    doctor: 'doctor', ceo: 'ceo', janitor: 'janitor', musician: 'musician',
    rapper: 'rapper', idol: 'idol', programmer: 'programmer', farmer: 'farmer', teacher: 'teacher',
    scientist: 'scientist', pilot: 'pilot', investor: 'investor'
  };
  return map[G.job.id] || null;
}

// ========== UI Helpers ==========
function setMsg(text) { msgBox.textContent = text; }

function updateUI() {
  const phaseNames = { opening: '🥚 はじまり', childhood: '🐣 子供時代', 'job-select': '💼 就職', adulthood: '🐤 大人時代', ending: '🏆 エンディング' };
  phaseLabel.textContent = phaseNames[G.phase] || '';
  if (G.phase === 'childhood') {
    dayLabel.textContent = `📅 ${G.day}日目 (残り${7 - G.day}日)`;
  } else if (G.phase === 'adulthood') {
    dayLabel.textContent = `📅 ${G.day}日目 (残り${10 - G.day}日)`;
  } else {
    dayLabel.textContent = '';
  }
  moneyLabel.textContent = `🪙 ${G.money}`;
  expLabel.textContent = `⭐ ${G.exp}`;

  let expHtml = '';
  if (G.phase === 'adulthood' && G.job) {
    const rankStars = '★'.repeat(G.jobRank) + '☆'.repeat(4 - G.jobRank);
    expHtml += `<div style="text-align:center;font-size:12px;font-weight:bold;margin-bottom:4px;">💼 ${getJobRankName()} ${rankStars} <span style="font-size:11px;color:#666;">(日給${getJobSalary()}🪙)</span></div>`;
  }
  if (G.phase === 'childhood' || G.phase === 'job-select' || G.phase === 'adulthood') {
    for (const [key, label] of Object.entries(SPEC_NAMES)) {
      if (G.specialExp[key] > 0) {
        expHtml += `<span class="exp-tag">${label}:${G.specialExp[key]}</span>`;
      }
    }
    if (G.rested) {
      expHtml += `<span class="rest-tag">✨休憩済み</span>`;
    }
  }
  expPanel.innerHTML = expHtml;
}

function clearButtons() { btnContainer.innerHTML = ''; }

function addButton(text, onClick, cls = '') {
  const b = document.createElement('button');
  b.className = 'btn ' + cls;
  b.textContent = text;
  b.addEventListener('click', onClick);
  btnContainer.appendChild(b);
  return b;
}

function addButtonHTML(html, onClick, cls = '') {
  const b = document.createElement('button');
  b.className = 'btn ' + cls;
  b.innerHTML = html;
  b.addEventListener('click', onClick);
  btnContainer.appendChild(b);
  return b;
}

  const colors = ['#EF5350', '#AB47BC', '#42A5F5', '#FFCA28', '#FF7043'];
  for (let i = 0; i < 8; i++) {
    const x = 30 + i * 60 + Math.sin(i * 3) * 15;

    ctx.fillStyle = '#43A047'; ctx.fillRect(x + 3, y, 3, 15);
    ctx.fillStyle = colors[i % colors.length];
    for (let p = 0; p < 5; p++) {

let shopActionUsed = false;
function openShop(type) {
  shopModal.style.display = 'flex';
  shopActionUsed = false;
  let html = '';
  if (type === 'house') {
    html = '<h3>🏠 不動産屋</h3>';
    HOUSES.forEach((h, i) => {
      if (i <= G.house) {
        html += `<div class="shop-item"><span>${h.name}</span><span class="owned">${i === G.house ? '現在の家' : '売却済み'}</span></div>`;
      } else {
        const canBuy = G.money >= h.price;
        html += `<div class="shop-item"><span>${h.name} (${h.price}🪙)</span><button onclick="buyHouse(${i})" ${canBuy ? '' : 'disabled'}>購入</button></div>`;
      }
    });
  } else {
    html = '<h3>🛒 お店</h3>';
    SHOP_ITEMS.forEach(item => {
      if (G.items.includes(item.id)) {
        html += `<div class="shop-item"><span>${item.name}</span><span class="owned">購入済み✓</span></div>`;
      } else {
        const canBuy = G.money >= item.price;
        html += `<div class="shop-item"><span>${item.name} (${item.price}🪙)</span><button onclick="buyItem('${item.id}')" ${canBuy ? '' : 'disabled'}>購入</button></div>`;
      }
    });
  }
  html += '<div style="text-align:center;margin-top:12px;"><button class="btn" onclick="closeShop()">閉じる</button></div>';
  shopContent.innerHTML = html;
}

window.buyItem = function(id) {
  const item = SHOP_ITEMS.find(i => i.id === id);
  if (item && G.money >= item.price && !G.items.includes(id)) {
    if (!shopActionUsed) { G.actionsLeft--; shopActionUsed = true; }
    G.money -= item.price;
    G.items.push(id);
    G.expression = 'happy';
    setMsg(`${item.name} を買った！`);
    updateUI();
    openShop(G.phase === 'childhood' ? 'child' : 'adult');
  }
};

window.buyHouse = function(index) {
  const h = HOUSES[index];
  if (G.money >= h.price && index > G.house) {
    if (!shopActionUsed) { G.actionsLeft--; shopActionUsed = true; }
    G.money -= h.price;
    G.house = index;
    G.expression = 'happy';
    setMsg(`${h.name} に引っ越した！`);
    updateUI();
    openShop('house');
  }
};

window.closeShop = function() {
  shopModal.style.display = 'none';
  if (G.phase === 'childhood' || G.phase === 'adulthood') {
    showPlaces();
  }
};

// ========== Game Loop ==========
let lastTime = 0;
function gameLoop(time) {
  const dt = (time - lastTime) / 1000;
  lastTime = time;
  G.animTime += dt;
  if (G.phase === 'opening') updateOpening(dt);
  render();
  requestAnimationFrame(gameLoop);
}

// ========== Job Select ==========
function startJobSelect() {
  G.phase = 'job-select';
  currentScene = 'egg'; G.expression = 'normal'; G.costume = null;
  setMsg('🎓 子供時代が終わった！ さあ、就職だ！');
  updateUI(); clearButtons();
  actionTitle.textContent = '💼 職業を選ぼう';

  JOBS.forEach(job => {
    const can = canDoJob(job);
    const disc = getItemDiscounts(job);
    const hasDiscount = Object.values(disc).some(v => v > 0);
    const discLabel = hasDiscount ? ' 🎁' : '';
    const b = addButtonHTML(
      `${job.name}${discLabel}<br><span style="font-size:11px">日給${job.salary}🪙</span>`,
      () => { G.job = job; G.jobHistory = []; G.jobWorkCount = 0; G.jobRank = 0; startAdulthood(); }
    );
    if (!can) {
      b.disabled = true;
      b.title = getJobRequirement(job) + (hasDiscount ? '\n持ち物ボーナス適用中！' : '');
    }
  });
}

function getItemDiscounts(job) {
  const discounts = { _exp: 0 };
  if (!job.itemBonus) return discounts;
  for (const [itemId, bonuses] of Object.entries(job.itemBonus)) {
    if (G.items.includes(itemId)) {
      for (const [key, val] of Object.entries(bonuses)) {
        discounts[key] = (discounts[key] || 0) + val;
      }
    }
  }
  return discounts;
}

function canDoJob(job) {
  const disc = getItemDiscounts(job);
  const effectiveExp = job.reqExp - (disc._exp || 0);
  if (G.exp < effectiveExp) return false;
  if (job.reqSpecial) {
    for (const [key, val] of Object.entries(job.reqSpecial)) {
      const effectiveReq = Math.max(0, val - (disc[key] || 0));
      if (G.specialExp[key] < effectiveReq) return false;
    }
  }
  return true;
}

function getJobRequirement(job) {
  const disc = getItemDiscounts(job);
  const specNames = { medical: '医療', cooking: '料理', art: '芸術', construction: '建築', music: '音楽', dance: 'ダンス', tech: '技術', farming: '農業', science: '科学' };
  const baseExp = job.reqExp;
  const effExp = baseExp - (disc._exp || 0);
  let req = effExp < baseExp ? `EXP${effExp}(${baseExp})` : `EXP${baseExp}`;
  if (job.reqSpecial) {
    for (const [key, val] of Object.entries(job.reqSpecial)) {
      const effVal = Math.max(0, val - (disc[key] || 0));
      req += effVal < val ? ` ${specNames[key]}${effVal}(${val})` : ` ${specNames[key]}${val}`;
    }
  }
  return req;
}

function getItemBonusText(job) {
  if (!job.itemBonus) return '';
  const specNames = { medical: '医療', cooking: '料理', art: '芸術', construction: '建築', music: '音楽', dance: 'ダンス', tech: '技術', farming: '農業', science: '科学', _exp: 'EXP' };
  let parts = [];
  for (const [itemId, bonuses] of Object.entries(job.itemBonus)) {
    const item = SHOP_ITEMS.find(i => i.id === itemId);
    const owned = G.items.includes(itemId);
    const bText = Object.entries(bonuses).map(([k, v]) => `${specNames[k] || k}-${v}`).join(',');
    parts.push(`${owned ? '✅' : ''}${item ? item.name : itemId}(${bText})`);
  }
  return parts.join(' ');
}

// ========== Adulthood ==========
function startAdulthood() {
  G.phase = 'adulthood'; G.day = 0; G.maxDays = 10;
  G.expression = 'happy'; G.rested = false;
  setMsg(`🎉 ${G.job.name} として社会人デビュー！`);
  updateUI(); clearButtons();
  addButton('🏢 大人の世界へ！', () => nextDay(), 'btn-primary');
}

// ========== Ending ==========
function startEnding() {
  G.phase = 'ending'; G.costume = 'retired'; currentScene = 'home';
  G.expression = 'happy';

  const houseScore = G.house * 500;
  const itemScore = G.items.length * 100;
  const moneyScore = Math.max(0, G.money);
  const jobScore = G.job ? getJobSalary() : 0;
  const rankScore = G.jobRank * 200;
  const careerScore = G.jobHistory.length * 50;
  const totalScore = houseScore + itemScore + moneyScore + jobScore + rankScore + careerScore;

  let rank = '🐣 ひよっこアヒル';
  if (totalScore >= 5000) rank = '🌈 レジェンドアヒル';
  else if (totalScore >= 3500) rank = '🌟 スーパーアヒル';
  else if (totalScore >= 2500) rank = '👑 セレブアヒル';
  else if (totalScore >= 1500) rank = '🎉 幸せアヒル';
  else if (totalScore >= 800) rank = '🐤 がんばったアヒル';

  setMsg(`🏆 おつかれさま！`);
  updateUI();
  actionTitle.textContent = '🏆 人生の振り返り';
  clearButtons();

  const finalJobName = getJobRankName();
  const allJobs = G.jobHistory.length > 0
    ? G.jobHistory.join(' → ') + ' → ' + finalJobName
    : finalJobName;

  const endInfo = document.createElement('div');
  endInfo.style.cssText = 'text-align:left; font-size:13px; padding:0 8px; margin-bottom:10px;';
  endInfo.innerHTML = `
    <div style="text-align:center; font-size:20px; font-weight:bold; margin-bottom:8px;">${rank}</div>
    <p>💼 職歴: ${allJobs}</p>
    <p>🏠 住まい: ${HOUSES[G.house].name}</p>
    <p>👜 持ち物(${G.items.length}個): ${G.items.length > 0 ? G.items.map(id => SHOP_ITEMS.find(i => i.id === id)?.name || id).join(', ') : 'なし'}</p>
    <p>🪙 残金: ${G.money} ダック</p>
    <hr style="margin:6px 0; border-color:#FFD54F;">
    <p style="text-align:center; font-size:16px; font-weight:bold;">🏆 総合スコア: ${totalScore.toLocaleString()}</p>
    <p style="text-align:center; font-size:11px; color:#888;">家${houseScore} + アイテム${itemScore} + 貯金${moneyScore} + 職業${jobScore} + ランク${rankScore} + 経歴${careerScore}</p>
  `;
  btnContainer.appendChild(endInfo);

  // Leaderboard integration
  scoreSubmitted = false;
  fetchLeaderboard().then(() => {
    if (isHighScore(totalScore)) {
      const hsDiv = document.createElement('div');
      hsDiv.id = 'hsEntry';
      hsDiv.style.cssText = 'text-align:center; margin:8px 0;';
      hsDiv.innerHTML = `
        <p style="color:#F57F17; font-weight:bold; margin-bottom:6px;">🎊 ランキング入り！名前を入力してね</p>
        <input type="text" id="hsName" maxlength="15" placeholder="なまえ（15文字まで）" style="width:80%; padding:8px 12px; border:2px solid #FFB300; border-radius:10px; font-size:14px; text-align:center; font-family:inherit;">
        <br>
        <button class="btn btn-primary" id="hsSubmit" style="margin-top:8px;">とうろく</button>
      `;
      btnContainer.appendChild(hsDiv);

      document.getElementById('hsSubmit').addEventListener('click', async () => {
        const name = document.getElementById('hsName').value.trim();
        if (name.length > 0 && !scoreSubmitted) {
          await submitScore(name, totalScore, finalJobName, rank);
          hsDiv.innerHTML = '<p style="color:#F57F17; font-weight:bold;">✅ 登録しました！</p>';
        }
      });
      document.getElementById('hsName').addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); document.getElementById('hsSubmit').click(); }
      });
    }
  });

  addButton('📊 ランキング', () => showLeaderboardOverlay());
  addButton('🔄 もう一度遊ぶ', () => {
    G.money = 0; G.exp = 0; G.items = []; G.house = 0; G.job = null;
    G.specialExp = { medical: 0, cooking: 0, art: 0, construction: 0, music: 0, dance: 0, tech: 0, farming: 0, science: 0 };
    G.jobHistory = []; G.rested = false; G.jobWorkCount = 0; G.jobRank = 0;
    startOpening();
  }, 'btn-primary');
}

// ========== Init ==========
requestAnimationFrame(gameLoop);
startOpening();
</script>
</body>
</html>
