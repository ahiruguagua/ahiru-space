<html lang="ja">
<head>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', 'Noto Sans JP', sans-serif;
      background: #f5f0eb;
      color: #2C3E50;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .back-link {
      position: fixed; top: 16px; left: 16px; z-index: 100;
      color: #546E7A; text-decoration: none; font-size: 14px;
      font-weight: 800; padding: 6px 16px; background: rgba(255,255,255,0.85);
      border-radius: 20px; border: 1px solid rgba(0,0,0,0.08);
      backdrop-filter: blur(8px); transition: all 0.3s;
    }
    .back-link:hover { color: #FF8C00; border-color: #FFD700; }

    .hero-image {
      width: 100%;
      max-width: 520px;
      margin: 80px auto 0;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    }
    .hero-image img {
      width: 100%;
      height: auto;
      display: block;
    }

    .content {
      max-width: 520px;
      width: 100%;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
    }

    .content h1 {
      font-size: 1.8rem;
      font-weight: 900;
      color: #FF8C00;
      margin-bottom: 0.5rem;
    }

    .content .subtitle {
      color: #546E7A;
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    .link-card {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 16px;
      text-decoration: none;
      color: #2C3E50;
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
      border: 2px solid transparent;
      transition: all 0.3s;
      overflow: hidden;
    }
    .link-card:hover {
      border-color: #FFD700;
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(255,215,0,0.15);
    }

    .link-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
    }

    .link-body {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
    }

    .link-icon {
      font-size: 1.8rem;
      flex-shrink: 0;
      width: 40px;
      text-align: center;
    }

    .link-text h3 {
      font-size: 1rem;
      font-weight: 800;
      margin-bottom: 0.2rem;
    }
    .link-text p {
      font-size: 0.85rem;
      color: #546E7A;
      line-height: 1.5;
    }

    .section-title {
      width: 100%;
      max-width: 400px;
      text-align: left;
      margin-top: 1.5rem;
    }
    .section-title:first-child {
      margin-top: 0;
    }
    .section-title h2 {
      font-size: 1.2rem;
      font-weight: 800;
      color: #2C3E50;
    }
    .section-title .accent-line {
      width: 40px;
      height: 3px;
      background: #FFD700;
      border-radius: 2px;
      margin-top: 0.4rem;
    }

    .card-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      align-items: center;
    }

    .track-list {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .track-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0;
      background: white;
      border-radius: 12px;
      text-decoration: none;
      color: #2C3E50;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      border: 2px solid transparent;
      transition: all 0.3s;
      overflow: hidden;
    }
    .track-item:hover {
      border-color: #FFD700;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(255,215,0,0.15);
    }
    .track-item .track-thumb {
      width: 80px;
      height: 52px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .track-item .track-name {
      font-size: 0.95rem;
      font-weight: 700;
      padding-right: 1rem;
    }

    footer {
      margin-top: auto;
      padding: 2rem;
      text-align: center;
      color: #90A4AE;
      font-size: 0.8rem;
    }
  </style>
</head>
